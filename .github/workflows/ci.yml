name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Audit
        run: npm audit --audit-level=moderate
      - name: Check
        run: npm run check
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
